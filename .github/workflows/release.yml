# Build + publication auto sur GitHub Releases (mac + windows) à chaque tag « vX.Y.Z ».
#
# Utilisation :
#   1. Monte "version" dans package.json (ex. 0.2.0).
#   2. git commit -am "v0.2.0" && git tag v0.2.0 && git push --follow-tags
#   3. Le workflow build sur macOS ET Windows et uploade les installeurs + manifestes
#      (latest.yml / latest-mac.yml) dans un MÊME brouillon de release GitHub.
#   4. Une fois les deux plateformes terminées, le job « publish » bascule le brouillon en
#      release publiée → les apps installées se mettent à jour automatiquement.
#
# Pourquoi un brouillon puis une publication séparée (et pas `releaseType: release`) :
#   Les deux jobs de la matrice (mac + win) tournent EN PARALLÈLE et publient chacun via
#   electron-builder. Publier directement une release non-brouillon provoque une course :
#   le 1er runner crée la release, le 2nd se prend un « 422 — Published releases must have a
#   valid tag » (le tag n'existe que dans le repo source, pas dans le repo des releases).
#   Un brouillon est tolérant à la création concurrente ; on le publie ensuite en une fois.
#
# Sécurité chaîne d'appro :
#   - Les actions tierces sont ÉPINGLÉES à un SHA1 de commit (immuable), pas à un tag mobile.
#     Le commentaire « # vX.Y.Z » indique la version lisible. À chaque mise à jour d'une action,
#     re-vérifier son code avant de changer le SHA.
#   - Une attestation de provenance (actions/attest-build-provenance) est générée pour chaque
#     installeur publié → vérifiable avec `gh attestation verify <fichier> -R <owner>/<repo>`.
#
# GITHUB_TOKEN est fourni automatiquement par Actions.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # créer/mettre à jour la release
  id-token: write # OIDC, requis par l'attestation de provenance
  attestations: write # écrire l'attestation de provenance

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build renderer
        env:
          # Config compte cloud (Supabase). Clé anon PUBLIQUE (protégée par RLS) → des
          # « Variables » de dépôt suffisent (Settings → Secrets and variables → Actions →
          # Variables). Vides si non définies → la fonctionnalité « compte » reste masquée.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Package app
        env:
          # Pas de signature mac sans certificat Apple → on désactive la découverte auto
          # (le build réussit ; la signature pourra être ajoutée plus tard).
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish never

      - name: Attestation de provenance (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release/*.dmg
            release/*.zip

      - name: Attestation de provenance (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release/*.exe

      - name: Scan release artifacts with VirusTotal
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: node scripts/virustotal-scan.mjs

      # Uploade les artefacts de cette plateforme dans le brouillon partagé
      # (`releaseType: draft` dans package.json → find-or-create du même brouillon).
      - name: Upload des artefacts dans le brouillon
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: npx electron-builder --publish always

  # Une fois mac ET windows terminés, bascule le brouillon en release publiée (une seule fois).
  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publier le brouillon de release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo Frensh-Developpeur/DofusCodex-releases --draft=false --latest
